<div class="d-flex flex-sm-column justify-content-around text-center">
  <a
    *ngFor="let icon of constants.SOCIAL_ICONS; trackBy: constants.trackByFn"
    href="{{icon.url}}"
    target="_blank"
    rel="noreferrer noopener"
    class="mx-4 mx-sm-0 rounded-circle text-lightblue"
  >
    <fa-icon [icon]="icon.icon" class="fa-4x fa-fw"></fa-icon>
  </a>
</div>
